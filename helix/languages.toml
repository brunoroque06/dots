[[language]]
name = "css"
formatter = { command = "prettier", args = ["--parser", "css"] }

[[language]]
name = "d2"
scope = "source.d2"
file-types = ["d2"]
formatter = { command = "elvish", args = ["-c", "var tmp = (mktemp d2fmt.XXXX); try { cat > $tmp; d2 fmt $tmp; cat $tmp } finally { rm $tmp }"] }

[[grammar]]
source = { git = "https://github.com/ravsii/tree-sitter-d2", rev = "main" }
name = "d2"

[[language]]
name = "go"
formatter = { command = "gofmt" }

[[language]]
name = "html"
formatter = { command = "prettier", args = ["--parser", "html"] }

[[language]]
name = "javascript"
formatter = { command = "prettier", args = ["--parser", "babel"] }

[[language]]
name = "json"
formatter = { command = "prettier", args = ["--parser", "json"] }

[[language]]
name = "markdown"
formatter = { command = "prettier", args = ["--parser", "markdown"] }

[[language]]
name = "python"
formatter = { command = "ruff", args = ["format", "-"] }
language-servers = ["pyright", "ruff"]

[[language]]
name = "rust"
formatter = { command = "rustfmt" }

[[language]]
name = "scss"
formatter = { command = "prettier", args = ["--parser", "scss"] }

[[language]]
name = "sql"
formatter = { command = "pg_format" }

[[language]]
name = "typescript"
formatter = { command = "prettier", args = ["--parser", "typescript"] }

[[language]]
name = "typst"
formatter = { command = "typstyle" }

[[language]]
name = "yaml"
formatter = { command = "prettier", args = ["--parser", "yaml"] }
