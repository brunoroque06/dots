on: [push]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: npm install -g prettier
      - run: cargo install stylua
      - run: |
          wget https://github.com/LuaLS/lua-language-server/releases/download/3.17.1/lua-language-server-3.17.1-linux-x64.tar.gz
          sudo mkdir /usr/lib/lua-language-server
          sudo tar -xzf lua-language-server-3.17.1-linux-x64.tar.gz -C /usr/lib/lua-language-server
          sudo ln -s /usr/lib/lua-language-server/bin/lua-language-server /usr/bin/lua-language-server

      - run: make fmt-check
      - run: make lint
